version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: autodraft
      POSTGRES_USER: autodraft
      POSTGRES_PASSWORD: autodraft
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autodraft"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8002:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"

  # ingest_worker:
  #   build: .
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     chromadb:
  #       condition: service_started
  #   env_file:
  #     - ../.env
  #   volumes:
  #     - ./credentials:/credentials:ro
  #   command: python -m ingest_service.worker

volumes:
  postgres_data:
  chroma_data:
